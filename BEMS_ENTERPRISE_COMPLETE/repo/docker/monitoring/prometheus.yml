global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bems-node-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
