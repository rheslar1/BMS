global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.example.com:587
  smtp_from: bems-alerts@example.com
  smtp_auth_username: bems-alerts@example.com
  smtp_auth_password: replace-me

route:
  receiver: operations-email
  group_by:
    - alertname
    - severity
  group_wait: 20s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: operations-email-and-slack

receivers:
  - name: operations-email
    email_configs:
      - to: facilities-ops@example.com
        send_resolved: true

  - name: operations-email-and-slack
    email_configs:
      - to: facilities-ops@example.com
        send_resolved: true
    slack_configs:
      - api_url: https://hooks.slack.com/services/REPLACE/ME/IN_PRODUCTION
        channel: "#bems-alerts"
        title: "{{ .CommonLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }} - {{ .Annotations.description }}\n{{ end }}"
        send_resolved: true
