name: BEMS CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure edge core
        run: cmake -S edge-core -B edge-core/build

      - name: Build edge core
        run: cmake --build edge-core/build

      - name: Check Node API syntax
        run: node --check server.js
        working-directory: node-api

      - name: Check Python AI service syntax
        run: python3 -m py_compile app.py
        working-directory: ai-service

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui
