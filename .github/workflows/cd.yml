name: BEMS CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish and deploy
        required: false
        default: ""
      canary_percent:
        description: Initial canary traffic percentage
        required: true
        default: "10"
      deploy_regions:
        description: Deployment regions
        required: true
        type: choice
        options:
          - primary
          - secondary
          - both
        default: primary
      promote_to_100:
        description: Promote canary to 100 percent after health checks
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
      - bems
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bems-api
            context: BEMS_ENTERPRISE_COMPLETE/repo
            dockerfile: BEMS_ENTERPRISE_COMPLETE/repo/node-api/Dockerfile
          - name: bems-ui
            context: BEMS_ENTERPRISE_COMPLETE/repo/ui
            dockerfile: BEMS_ENTERPRISE_COMPLETE/repo/ui/Dockerfile
          - name: bems-ai-service
            context: BEMS_ENTERPRISE_COMPLETE/repo/ai-service
            dockerfile: BEMS_ENTERPRISE_COMPLETE/repo/ai-service/Dockerfile
          - name: bems-edge-core
            context: BEMS_ENTERPRISE_COMPLETE/repo
            dockerfile: BEMS_ENTERPRISE_COMPLETE/repo/edge-core/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image_namespace
        run: echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image_namespace.outputs.value }}/${{ matrix.name }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ steps.image_namespace.outputs.value }}/${{ matrix.name }}:latest

  deploy-primary-canary:
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.deploy_regions == 'primary' || inputs.deploy_regions == 'both') }}
    runs-on: ubuntu-latest
    environment: production-primary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image_namespace
        run: echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy primary canary
        env:
          REGION: primary
          REMOTE_HOST: ${{ secrets.PRIMARY_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER || 'ubuntu' }}
          REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/bems' }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.image_namespace.outputs.value }}
          CANARY_PERCENT: ${{ inputs.canary_percent }}
          ALB_LISTENER_ARN: ${{ secrets.PRIMARY_ALB_LISTENER_ARN }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.PRIMARY_BLUE_TARGET_GROUP_ARN }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.PRIMARY_GREEN_TARGET_GROUP_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.PRIMARY_AWS_REGION || 'us-east-1' }}
        run: ./scripts/deploy_canary.sh
        working-directory: BEMS_ENTERPRISE_COMPLETE/repo

      - name: Promote primary canary
        if: ${{ inputs.promote_to_100 }}
        env:
          CANARY_PERCENT: "100"
          ALB_LISTENER_ARN: ${{ secrets.PRIMARY_ALB_LISTENER_ARN }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.PRIMARY_BLUE_TARGET_GROUP_ARN }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.PRIMARY_GREEN_TARGET_GROUP_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.PRIMARY_AWS_REGION || 'us-east-1' }}
        run: ./scripts/promote_canary.sh
        working-directory: BEMS_ENTERPRISE_COMPLETE/repo

  deploy-secondary-canary:
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.deploy_regions == 'secondary' || inputs.deploy_regions == 'both') }}
    runs-on: ubuntu-latest
    environment: production-secondary
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: image_namespace
        run: echo "value=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy secondary canary
        env:
          REGION: secondary
          REMOTE_HOST: ${{ secrets.SECONDARY_DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER || 'ubuntu' }}
          REMOTE_APP_DIR: ${{ vars.REMOTE_APP_DIR || '/opt/bems' }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.image_namespace.outputs.value }}
          CANARY_PERCENT: ${{ inputs.canary_percent }}
          ALB_LISTENER_ARN: ${{ secrets.SECONDARY_ALB_LISTENER_ARN }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.SECONDARY_BLUE_TARGET_GROUP_ARN }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.SECONDARY_GREEN_TARGET_GROUP_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.SECONDARY_AWS_REGION || 'us-west-2' }}
        run: ./scripts/deploy_canary.sh
        working-directory: BEMS_ENTERPRISE_COMPLETE/repo

      - name: Promote secondary canary
        if: ${{ inputs.promote_to_100 }}
        env:
          CANARY_PERCENT: "100"
          ALB_LISTENER_ARN: ${{ secrets.SECONDARY_ALB_LISTENER_ARN }}
          BLUE_TARGET_GROUP_ARN: ${{ secrets.SECONDARY_BLUE_TARGET_GROUP_ARN }}
          GREEN_TARGET_GROUP_ARN: ${{ secrets.SECONDARY_GREEN_TARGET_GROUP_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.SECONDARY_AWS_REGION || 'us-west-2' }}
        run: ./scripts/promote_canary.sh
        working-directory: BEMS_ENTERPRISE_COMPLETE/repo
